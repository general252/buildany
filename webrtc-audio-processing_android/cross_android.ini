[constants]
ndk_path = '/opt/android-ndk-r21e'
toolchain = ndk_path + '/toolchains/llvm/prebuilt/linux-x86_64/bin/'

[binaries]
c = toolchain + 'aarch64-linux-android29-clang'
cpp = toolchain + 'aarch64-linux-android29-clang++'
ar = toolchain + 'aarch64-linux-android-ar'
strip = toolchain + 'aarch64-linux-android-strip'
pkg-config = 'pkg-config'

[host_machine]
system = 'android'
cpu_family = 'aarch64'
cpu = 'armv8-a'
endian = 'little'